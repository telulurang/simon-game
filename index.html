    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); display:none; align-items:center; justify-content:center; z-index:500; }
    .modal-overlay.show { display:flex; }
    .modal-box { background:#1e1e3a; border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:24px; width:300px; max-width:90vw; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.5); animation:popIn 0.2s ease; }

    .name-row { display:flex; gap:8px; justify-content:center; margin-bottom:8px; }
    .name-input { padding:8px 12px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:white; border-radius:8px; font-size:0.9em; width:160px; outline:none; }

<body>
<div class="wrap">
  <h1>🧠 사이먼</h1>
  <div class="subtitle">매 단계마다 새로운 순서를 기억하세요</div>
  <div class="info-row">
    <div class="info-box"><div class="info-label">단계</div><div class="info-value" id="stageVal">-</div></div>
    <div class="info-box"><div class="info-label">최고 단계</div><div class="info-value" id="bestVal">-</div></div>
    <div class="info-box">
      <div class="info-label">목숨</div>
      <div class="life-box" id="lifeBox">
        <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button class="gbtn btn-start" id="startBtn">▶ 시작</button>
    <button class="gbtn btn-rank"  id="rankBtn">🏆 랭킹</button>
    <button class="gbtn btn-end"   id="endBtn">⏹ 종료</button>
  </div>
  <div class="status idle" id="status">시작 버튼을 눌러주세요</div>
  <div class="stage-badge" id="stageBadge"></div>

  <div class="modal-overlay" id="failOverlay">
    <div class="modal-box">
      <div class="fail-title">❌ 틀렸어요!</div>
      <div class="fail-sub" id="failSub"></div>
      <button class="retry-btn" id="retryBtn">🔄 이 단계 다시 시작</button>
    </div>
  </div>

  <div class="modal-overlay" id="gameoverOverlay">
    <div class="modal-box">
      <div class="gameover-title" id="gameoverTitle">⏹ 게임 종료</div>
      <div class="gameover-score" id="gameoverScore"></div>
      <div class="name-row">
        <input class="name-input" id="nameInput" placeholder="닉네임 (최대 10자)" maxlength="10">
        <button class="submit-btn" id="submitBtn">🏆 등록</button>
      </div>
      <div class="retry-msg-go" id="retryMsgGo">❌ 등록 실패. 다시 시도해주세요.</div>
      <button class="gbtn btn-start" style="margin-top:10px;width:100%" id="restartBtn">🔄 새 게임</button>
    </div>

    <div class="progress-bar" id="progressBar" style="width:0%"></div>

</div>

<div class="overlay" id="rankOverlay">
  <div class="popup">
    <div class="popup-head">
      <div class="popup-title">🏆 글로벌 랭킹 Top 10</div>
      <button class="close-x" id="closeRank">×</button>
    </div>
    <div id="rankBody"></div>
  </div>
</div>

<script>
// ── 오디오 컨텍스트 ───────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ── 마림바 (타일 클릭음) ─────────────────────────
const MARIMBA_NOTES = [
  261.63,293.66,329.63,392.00,440.00,
  523.25,587.33,659.25,783.99,880.00,
  1046.50,1174.66,1318.51,1567.98,1760.00,
  349.23,415.30,466.16,369.99,311.13,
  554.37,622.25,698.46,830.61,932.33,
];
function playKalimba(idx){
  if(audioCtx.state==='suspended') audioCtx.resume();
  const freq = MARIMBA_NOTES[idx] || 440;
  const now  = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.5, now);
  master.connect(audioCtx.destination);

  // 마림바: 사인파 메인 + 빠른 감쇠 (나무 느낌)
  const o1=audioCtx.createOscillator(), g1=audioCtx.createGain();
  o1.type='sine'; o1.frequency.setValueAtTime(freq, now);
  g1.gain.setValueAtTime(0.9, now);
  g1.gain.exponentialRampToValueAtTime(0.001, now+0.6); // 칼림바보다 짧은 여운
  o1.connect(g1); g1.connect(master);
  o1.start(now); o1.stop(now+0.65);

  // 4배음 (마림바 특유의 따뜻한 배음)
  const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
  o2.type='sine'; o2.frequency.setValueAtTime(freq*4, now);
  g2.gain.setValueAtTime(0.25, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now+0.08); // 아주 빠르게 사라짐
  o2.connect(g2); g2.connect(master);
  o2.start(now); o2.stop(now+0.1);

  // 10배음 (어택 클릭감)
  const o3=audioCtx.createOscillator(), g3=audioCtx.createGain();
  o3.type='sine'; o3.frequency.setValueAtTime(freq*10, now);
  g3.gain.setValueAtTime(0.1, now);
  g3.gain.exponentialRampToValueAtTime(0.001, now+0.04);
  o3.connect(g3); g3.connect(master);
  o3.start(now); o3.stop(now+0.05);
}

// ── 피아노 배경음악 ───────────────────────────────
// 숲속 느낌의 Am 펜타토닉 + 바람 노이즈
const BGM = [
  [220.00,0.8],[246.94,0.6],[261.63,0.9],[293.66,0.7],
  [329.63,0.8],[293.66,0.6],[261.63,0.9],[246.94,0.7],
  [220.00,1.0],[196.00,0.8],[220.00,0.7],[261.63,0.9],
  [293.66,0.8],[329.63,0.7],[293.66,1.0],[261.63,0.8],
  [246.94,0.7],[220.00,0.9],[196.00,0.8],[174.61,1.2],
  [196.00,0.7],[220.00,0.8],[246.94,0.7],[261.63,1.0],
];
let bgmOn=false, bgmTid=null, bgmIdx=0;

function playPianoNote(){
  if(!bgmOn) return;
  const [freq,dur]=BGM[bgmIdx%BGM.length];
  bgmIdx++;
  const now=audioCtx.currentTime;
  const master=audioCtx.createGain();
  master.gain.setValueAtTime(0.42,now);
  master.connect(audioCtx.destination);

  // 메인 사인파 (피아노 바디)
  const o1=audioCtx.createOscillator(), g1=audioCtx.createGain();
  o1.type='sine'; o1.frequency.setValueAtTime(freq,now);
  g1.gain.setValueAtTime(0.8,now);
  g1.gain.exponentialRampToValueAtTime(0.001,now+dur+0.8);
  o1.connect(g1); g1.connect(master);
  o1.start(now); o1.stop(now+dur+0.9);

  // 삼각파 (따뜻한 배음)
  const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
  o2.type='triangle'; o2.frequency.setValueAtTime(freq,now);
  g2.gain.setValueAtTime(0.25,now);
  g2.gain.exponentialRampToValueAtTime(0.001,now+dur*0.5);
  o2.connect(g2); g2.connect(master);
  o2.start(now); o2.stop(now+dur*0.5+0.1);

  // 2배음 (맑은 하이톤)
  const o3=audioCtx.createOscillator(), g3=audioCtx.createGain();
  o3.type='sine'; o3.frequency.setValueAtTime(freq*2,now);
  g3.gain.setValueAtTime(0.08,now);
  g3.gain.exponentialRampToValueAtTime(0.001,now+dur*0.3);
  o3.connect(g3); g3.connect(master);
  o3.start(now); o3.stop(now+dur*0.3+0.1);

  // 리버브 효과 (딜레이로 공간감)
  const delay=audioCtx.createDelay(0.5);
  const delayGain=audioCtx.createGain();
  delay.delayTime.setValueAtTime(0.25,now);
  delayGain.gain.setValueAtTime(0.18,now);
  g1.connect(delay); delay.connect(delayGain); delayGain.connect(master);

  bgmTid=setTimeout(playPianoNote, dur*1000);
}

function startBgm(){
  bgmOn=false;
  if(bgmTid){ clearTimeout(bgmTid); bgmTid=null; }
  bgmOn=true; bgmIdx=0;
  audioCtx.resume().then(()=>{
    if(bgmOn){ playPianoNote(); }
  });
}
function stopBgm(){
  bgmOn=false;
  if(bgmTid){ clearTimeout(bgmTid); bgmTid=null; }
}

// ── 타일 ─────────────────────────────────────────
const COLORS=[
  '#ef476f','#f77f00','#fcbf49','#eae2b7','#06d6a0',
  '#00b4d8','#0077b6','#7b2d8b','#c77dff','#ff9f1c',
  '#e63946','#2dc653','#48cae4','#ff6b6b','#ffe66d',
  '#a8dadc','#457b9d','#e9c46a','#f4a261','#264653',
  '#6a4c93','#1982c4','#8ac926','#ff595e','#ffca3a',
];
const TOTAL=25, MAX_LIVES=3, FLASH_ON=400, FLASH_OFF=200;
const seqLen=stage=>stage+1;

let sequence=[],playerSeq=[],stage=0,lives=MAX_LIVES;
let isWatching=false,isPlaying=false,gameOver=false;
let bestStage=0,myRankId=null;

const gridEl=document.getElementById('grid');
const tiles=[];
for(let i=0;i<TOTAL;i++){
  const t=document.createElement('div');
  t.className='tile disabled';
  t.style.background=COLORS[i];
  t.style.color=COLORS[i];
  t.addEventListener('click',()=>onTileClick(i));
  gridEl.appendChild(t); tiles.push(t);
}

function setStatus(msg,cls=''){ const el=document.getElementById('status'); el.textContent=msg; el.className='status '+(cls||'idle'); }
function setStageBadge(txt){ document.getElementById('stageBadge').innerHTML=txt?`<span class="seq-count">${txt}</span>`:''; }
function updateInfo(){
  document.getElementById('stageVal').textContent=stage||'-';
  document.getElementById('bestVal').textContent=bestStage||'-';
  document.querySelectorAll('.heart').forEach((h,i)=>h.classList.toggle('lost',i>=lives));
  document.getElementById('progressBar').style.width=stage>0?Math.min((stage/30)*100,100)+'%':'0%';
}
function setTilesDisabled(v){ tiles.forEach(t=>t.classList.toggle('disabled',v)); }

function startGame(){
  sequence=[];playerSeq=[];stage=0;lives=MAX_LIVES;gameOver=false;myRankId=null;
  document.getElementById('failOverlay').classList.remove('show');
  document.getElementById('gameoverOverlay').classList.remove('show');
  document.getElementById('nameInput').value='';
  document.getElementById('retryMsgGo').style.display='none';
  setStageBadge(''); updateInfo(); nextStage();
}

function nextStage(){
  stage++; if(stage>bestStage) bestStage=stage; updateInfo();
  const len=seqLen(stage);
  const pool=[...Array(TOTAL).keys()];
  sequence=[];
  for(let i=0;i<len;i++){
    const ri=Math.floor(Math.random()*pool.length);
    sequence.push(pool[ri]); pool.splice(ri,1);
  }
  playerSeq=[];
  setTilesDisabled(true);
  setStageBadge(`단계 ${stage} — ${len}개 순서`);
  setStatus(`👀 단계 ${stage} — 잘 보세요! (${len}개)`,'watching');
  setTimeout(()=>playSequence(),600);
}

function playSequence(){
  isWatching=true; let i=0;
  function next(){
    if(i>=sequence.length){
      isWatching=false; setTilesDisabled(false);
      setStatus(`🖱️ 순서대로 눌러주세요! (${sequence.length}개)`,'your-turn');
      isPlaying=true; return;
    }
    flashTile(sequence[i],()=>{ i++; setTimeout(next,FLASH_OFF); });
  }
  next();
}

function flashTile(idx,cb){
  const t=tiles[idx]; t.classList.add('flash');
  setTimeout(()=>{ t.classList.remove('flash'); if(cb) cb(); },FLASH_ON);
}

function onTileClick(idx){
  if(!isPlaying||isWatching||gameOver) return;
  playKalimba(idx);
  const t=tiles[idx]; t.classList.add('pressed');
  setTimeout(()=>t.classList.remove('pressed'),150);
  playerSeq.push(idx);
  const pos=playerSeq.length-1;
  if(playerSeq[pos]!==sequence[pos]){ wrongAnswer(); return; }
  if(playerSeq.length===sequence.length){
    isPlaying=false; setTilesDisabled(true);
    setStatus('✅ 정답! 다음 단계로...','correct');
    setStageBadge('');
    setTimeout(()=>nextStage(),1000);
  }
}

function wrongAnswer(){
  isPlaying=false; setTilesDisabled(true); lives--; updateInfo();
  if(lives<=0){
    gameOver=true; setStatus('💀 게임 오버!','gameover'); setStageBadge('');
    setTimeout(()=>showGameover('gameover'),400);
  } else {
    setStatus(`❌ 틀렸어요! 목숨 ${lives}개 남음`,'wrong');
    document.getElementById('failSub').textContent=`목숨이 ${lives}개 남았어요. 단계 ${stage}를 다시 시도해요!`;
    document.getElementById('failOverlay').classList.add('show');
  }
}

function retryStage(){
  document.getElementById('failOverlay').classList.remove('show');
  playerSeq=[]; setStatus(`👀 단계 ${stage} 다시 보여드릴게요!`,'watching');
  setTilesDisabled(true); setTimeout(()=>playSequence(),600);
}

function showGameover(type){
  document.getElementById('gameoverTitle').textContent=type==='end'?'⏹ 게임 종료':'💀 게임 오버 (3번 실패)';
  document.getElementById('gameoverScore').textContent=`최고 단계: ${bestStage}단계`;
  document.getElementById('gameoverOverlay').classList.add('show');
}

function endGame(){
  if(gameOver) return;
  gameOver=true; isPlaying=false; isWatching=false;
  setTilesDisabled(true); setStatus('⏹ 종료되었습니다','idle'); setStageBadge('');
  document.getElementById('failOverlay').classList.remove('show');
  showGameover('end');
}

const medals=['🥇','🥈','🥉'];
async function submitRanking(){
  const name=document.getElementById('nameInput').value.trim();
  const btn=document.getElementById('submitBtn'), errEl=document.getElementById('retryMsgGo');
  if(!name){document.getElementById('nameInput').style.borderColor='#ef476f';return;}
  document.getElementById('nameInput').style.borderColor='';
  btn.disabled=true; btn.textContent='저장 중...'; errEl.style.display='none';
  try{
    const ref=await window.db.collection('simon_rankings').add({name,stage:bestStage,timestamp:Date.now(),date:new Date().toISOString()});
    myRankId=ref.id; document.getElementById('nameInput').value=''; showRankPopup();
  }catch(e){ errEl.style.display='block'; }
  finally{ btn.disabled=false; btn.textContent='🏆 등록'; }
}

async function showRankPopup(){
  document.getElementById('rankOverlay').classList.add('show');
  const body=document.getElementById('rankBody');
  body.innerHTML='<div class="no-rank">불러오는 중...</div>';
  try{
    const snap=await window.db.collection('simon_rankings').orderBy('stage','desc').orderBy('timestamp','asc').limit(50).get();
    const list=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!list.length){body.innerHTML='<div class="no-rank">아직 기록이 없어요!</div>';return;}
    const top10=list.slice(0,10);
    const myIdx=myRankId?list.findIndex(r=>r.id===myRankId):-1;
    let rows=top10.map((r,i)=>{
      const mine=myRankId&&r.id===myRankId;
      return `<tr class="${mine?'mine':''}"><td>${medals[i]??(i+1+'위')}</td><td>${r.name}</td><td>${r.stage}단계</td></tr>`;
    }).join('');
    if(myIdx>=10){
      const r=list[myIdx];
      rows+=`<tr><td colspan="3" style="color:rgba(255,255,255,0.3);text-align:center;padding:4px">···</td></tr>
      <tr class="mine"><td>${myIdx+1}위</td><td>${r.name}</td><td>${r.stage}단계</td></tr>`;
    }
    body.innerHTML=`<table class="rtable"><thead><tr><th>순위</th><th>닉네임</th><th>최고단계</th></tr></thead><tbody>${rows}</tbody></table>`;
    if(myIdx>=0&&myIdx<10)
      body.innerHTML+=`<div style="text-align:center;color:#ffd60a;margin-top:10px;font-size:0.85em">👈 내 기록: ${myIdx+1}위</div>`;
  }catch(e){
    body.innerHTML=`<div class="no-rank" style="color:#ef476f">불러오지 못했습니다.<br>
      <button onclick="showRankPopup()" style="margin-top:8px;padding:6px 16px;background:#ef476f;color:white;border:none;border-radius:6px;cursor:pointer">🔄 다시 시도</button></div>`;
  }
}

document.getElementById('startBtn').addEventListener('click',()=>{
  if(!gameOver&&stage>0) return;
  startBgm(); startGame();
});
document.getElementById('endBtn').addEventListener('click',()=>{ if(stage===0||gameOver)return; endGame(); });
document.getElementById('retryBtn').addEventListener('click',retryStage);
document.getElementById('restartBtn').addEventListener('click',()=>{ startBgm(); startGame(); });
document.getElementById('submitBtn').addEventListener('click',submitRanking);
document.getElementById('rankBtn').addEventListener('click',showRankPopup);
document.getElementById('closeRank').addEventListener('click',()=>document.getElementById('rankOverlay').classList.remove('show'));
document.getElementById('rankOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('rankOverlay')) document.getElementById('rankOverlay').classList.remove('show'); });
document.getElementById('nameInput').addEventListener('keydown',e=>{ if(e.key==='Enter') submitRanking(); });
</script>
</body>
</html>
